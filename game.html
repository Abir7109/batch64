<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>IELTS-64 | Black Hole Game</title>
    <meta property="og:title" content="IELTS-64 | Black Hole Game">
    <meta property="og:description" content="Slingshot students into the black hole! A fun Matter.js game from IELTS Batch 64.">
    <meta property="og:image" content="https://ielts64.netlify.app/metaimg/og-image.png">
    <meta property="og:url" content="https://ielts64.netlify.app/game.html">
    <meta property="og:type" content="website">
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="IELTS-64 | Black Hole Game">
    <meta name="twitter:description" content="Slingshot students into the black hole! A fun Matter.js game from IELTS Batch 64.">
    <meta name="twitter:image" content="https://ielts64.netlify.app/metaimg/og-image.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;500;600;700&family=Pacifico&family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.19.0/matter.min.js"></script>
    <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { height: 100%; overflow: hidden; }
        body {
            font-family: 'Quicksand', sans-serif;
            background: linear-gradient(180deg, #fdfbf7 0%, #FFF2D0 50%, #fdfbf7 100%);
            color: #444;
            display: flex;
            flex-direction: column;
            padding: 0;
            position: relative;
        }

        /* ---- Entrance Overlay ---- */
        #entranceOverlay {
            position: fixed; inset: 0; z-index: 9999;
            background: #fdfbf7;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            transition: opacity 0.6s ease, visibility 0.6s ease;
        }
        #entranceOverlay.hidden { opacity: 0; visibility: hidden; pointer-events: none; }
        #entranceOverlay h1 {
            font-family: 'Pacifico', cursive;
            font-size: 2.5rem;
            color: #e8956a;
            animation: entScale 0.8s cubic-bezier(0.34,1.56,0.64,1) both;
        }
        #entranceOverlay p {
            font-family: 'Quicksand', sans-serif;
            color: #c4836a;
            margin-top: 0.5rem;
            animation: entFade 0.6s 0.3s both;
        }
        @keyframes entScale { 0% { transform: scale(0); opacity: 0; } 100% { transform: scale(1); opacity: 1; } }
        @keyframes entFade { 0% { opacity: 0; transform: translateY(12px); } 100% { opacity: 1; transform: translateY(0); } }

        /* ---- Game Header ---- */
        .game-header {
            display: flex; justify-content: space-between; align-items: center;
            width: 100%;
            padding: 8px 10px 0;
            position: relative; z-index: 10;
            flex-shrink: 0;
        }
        .back-btn {
            font-family: 'Quicksand', sans-serif; font-weight: 700;
            font-size: 0.85rem; color: #c4836a;
            background: rgba(255,242,208,0.9);
            padding: 6px 14px; border-radius: 20px;
            border: 2px solid rgba(196,131,106,0.3);
            text-decoration: none; transition: all 0.2s ease;
            user-select: none;
        }
        .back-btn:hover { background: #FFF2D0; border-color: #e8956a; color: #e8956a; transform: scale(1.05); }
        .score-badge {
            font-family: 'Quicksand', sans-serif; font-weight: 700;
            font-size: 1rem; color: #e8956a;
            background: rgba(255,242,208,0.9);
            padding: 6px 16px; border-radius: 20px;
            z-index: 30; box-shadow: 0 2px 8px rgba(0,0,0,0.08);
            pointer-events: none;
            border: 2px solid rgba(232,149,106,0.3);
        }
        .score-badge span { color: #FFB2B2; font-size: 1.1rem; }

        .target-label {
            font-family: 'Pacifico', cursive; font-size: 1rem;
            color: #e8956a; background: rgba(255,242,208,0.9);
            padding: 3px 16px; border-radius: 20px;
            border: 2px solid rgba(232,149,106,0.3);
            margin: 4px 0 0; position: relative; z-index: 10;
            flex-shrink: 0;
        }

        /* ---- Game Board ---- */
        .game-board {
            position: relative;
            flex: 1;
            min-height: 0;
            width: 100%;
            overflow: hidden;
            background: #fdfbf7;
            box-shadow: inset 0 0 40px rgba(255,242,208,0.3);
            touch-action: none;
        }

        /* ---- Net Nodes ---- */
        .net-node {
            position: absolute; width: 110px; height: 110px; z-index: 2;
            border-radius: 50%; cursor: crosshair;
            transition: filter 0.25s ease, box-shadow 0.25s ease;
            user-select: none; -webkit-user-select: none;
        }
        .net-node.teacher { width: 130px; height: 130px; cursor: default; }
        .net-node.shooting { z-index: 15; filter: brightness(1.2) drop-shadow(0 0 16px rgba(78,205,196,0.5)); }
        .net-node:hover:not(.teacher) { filter: brightness(1.12) drop-shadow(0 0 12px rgba(255,178,178,0.4)); z-index: 10; }
        .net-node.entrance { animation: nodeEntrance 0.5s cubic-bezier(0.34,1.56,0.64,1) both; }
        @keyframes nodeEntrance { 0% { transform: scale(0); opacity: 0; } 100% { transform: scale(1); opacity: 1; } }
        .net-img { width: 100%; height: 100%; border-radius: 50%; overflow: hidden; border: 4px solid #FFF2D0; box-shadow: 0 3px 12px rgba(0,0,0,0.08); }
        .net-img img { width: 100%; height: 100%; object-fit: cover; display: block; }
        .photo-placeholder { width: 100%; height: 100%; background: linear-gradient(135deg, #FFB2B2 0%, #FFF2D0 100%); display: flex; align-items: center; justify-content: center; font-size: 2.8rem; border-radius: 50%; }
        .net-label { font-family: 'Pacifico', cursive; font-size: 13px; color: #e8956a; display: block; text-align: center; margin-top: 6px; white-space: nowrap; }
        .net-node.teacher .net-label { font-size: 14px; }

        /* ---- Black Hole ---- */
        .black-hole {
            position: absolute; border-radius: 50%; pointer-events: none; z-index: 5;
            background: radial-gradient(circle at 30% 30%, #000 0%, #1a1a2e 35%, #2d1b69 55%, transparent 75%);
            box-shadow: 0 0 40px rgba(45,27,105,0.5), 0 0 80px rgba(26,26,46,0.3), inset 0 0 60px rgba(0,0,0,0.4);
            transition: left 0.4s ease, top 0.4s ease;
            width: 130px; height: 130px;
        }
        .black-hole::after {
            content: ''; position: absolute; inset: 10%; border-radius: 50%;
            background: radial-gradient(circle at 40% 40%, rgba(255,255,255,0.12), transparent 70%);
            pointer-events: none;
        }
        .black-hole.pulse { animation: holeSwirl 4s linear infinite; }
        .black-hole.glow { box-shadow: 0 0 60px rgba(45,27,105,0.7), 0 0 100px rgba(26,26,46,0.4), inset 0 0 60px rgba(0,0,0,0.4); }
        .black-hole.entrance { animation: holeEntrance 0.6s cubic-bezier(0.34,1.56,0.64,1) both; }
        @keyframes holeEntrance { 0% { transform: scale(0); opacity: 0; } 100% { transform: scale(1); opacity: 1; } }
        @keyframes holeSwirl { 0% { transform: rotate(0deg) scale(1); } 50% { transform: rotate(180deg) scale(1.06); } 100% { transform: rotate(360deg) scale(1); } }

        /* ---- Aim Line ---- */
        .aim-line {
            position: absolute; height: 5px; border-radius: 3px;
            transform-origin: 0 50%; pointer-events: none; z-index: 25;
            display: none; opacity: 0.9;
            box-shadow: 0 0 10px rgba(255,255,255,0.5), 0 0 25px rgba(78,205,196,0.25);
        }
        .aim-line::after {
            content: ''; position: absolute; right: -2px; top: 50%;
            transform: translateY(-50%);
            width: 0; height: 0;
            border-top: 7px solid transparent;
            border-bottom: 7px solid transparent;
            border-left: 12px solid currentColor;
            filter: drop-shadow(0 0 4px rgba(255,255,255,0.5));
        }
        .aim-line-dot {
            position: absolute; width: 16px; height: 16px; border-radius: 50%;
            background: radial-gradient(circle at 40% 40%, #fff 0%, rgba(78,205,196,0.7) 60%, transparent 100%);
            box-shadow: 0 0 14px rgba(78,205,196,0.7), 0 0 30px rgba(78,205,196,0.3);
            pointer-events: none; z-index: 26; display: none;
            transform: translate(-50%, -50%);
            animation: aimDotPulse 0.8s ease-in-out infinite alternate;
        }
        @keyframes aimDotPulse { 0% { box-shadow: 0 0 14px rgba(78,205,196,0.7), 0 0 30px rgba(78,205,196,0.3); transform: translate(-50%, -50%) scale(1); } 100% { box-shadow: 0 0 20px rgba(78,205,196,0.9), 0 0 40px rgba(78,205,196,0.4); transform: translate(-50%, -50%) scale(1.15); } }

        /* ---- Score Popup ---- */
        .member-score-popup {
            position: absolute; font-family: 'Pacifico', cursive; font-size: 1.8rem;
            color: #FFD700; text-shadow: 0 2px 8px rgba(0,0,0,0.3);
            pointer-events: none; z-index: 40;
            animation: scoreFloat 1s ease-out forwards;
        }
        @keyframes scoreFloat { 0% { opacity: 1; transform: translateY(0) scale(1); } 100% { opacity: 0; transform: translateY(-60px) scale(1.4); } }

        /* ---- Overlays ---- */
        .game-overlay {
            position: absolute; inset: 0; display: none;
            flex-direction: column; align-items: center; justify-content: center;
            z-index: 50; border-radius: 16px;
            background: rgba(0,0,0,0.55);
            backdrop-filter: blur(4px); -webkit-backdrop-filter: blur(4px);
        }
        .game-overlay.active { display: flex; }
        .game-overlay h2 { font-family: 'Pacifico', cursive; font-size: 2.2rem; margin: 0 0 0.5rem; text-shadow: 0 2px 12px rgba(0,0,0,0.3); }
        .game-overlay .score-final { font-family: 'Quicksand', sans-serif; font-size: 1.2rem; color: #fff; opacity: 0.9; margin-bottom: 1.2rem; }
        .game-overlay button {
            font-family: 'Quicksand', sans-serif; font-weight: 700;
            padding: 10px 28px; background: #FFB2B2; border: none;
            border-radius: 30px; color: #fff; font-size: 1rem;
            cursor: pointer; transition: transform 0.2s ease, box-shadow 0.2s ease;
            box-shadow: 0 4px 15px rgba(255,178,178,0.4);
        }
        .game-overlay button:hover { transform: scale(1.08); box-shadow: 0 6px 20px rgba(255,178,178,0.5); }
        .game-win h2 { color: #FFD700; }
        .game-over h2 { color: #FF6B6B; }

        /* ---- Reset Button (below board) ---- */
        .reset-btn {
            font-family: 'Quicksand', sans-serif; font-weight: 700;
            font-size: 0.85rem; color: #c4836a;
            background: rgba(255,242,208,0.9);
            padding: 6px 18px; border-radius: 20px;
            border: 2px solid rgba(196,131,106,0.3);
            cursor: pointer; transition: all 0.2s ease;
            user-select: none; margin: 6px 0;
            flex-shrink: 0;
        }
        .reset-btn:hover { background: #FFF2D0; border-color: #e8956a; color: #e8956a; transform: scale(1.05); }

        /* ---- Confetti Particle ---- */
        .confetti-particle {
            position: fixed; pointer-events: none; z-index: 9998;
            width: 10px; height: 10px; border-radius: 2px;
            animation: confettiBurst 0.7s ease-out forwards;
        }
        @keyframes confettiBurst { 0% { opacity: 1; transform: translate(0,0) scale(1) rotate(0deg); } 100% { opacity: 0; transform: translate(var(--dx), var(--dy)) scale(0.3) rotate(720deg); } }

        /* ---- Twinkle Dots ---- */
        .twinkle {
            position: fixed; width: 3px; height: 3px;
            background: rgba(232,149,106,0.2); border-radius: 50%;
            pointer-events: none; z-index: 0;
            animation: twinkleAnim 3s ease-in-out infinite;
        }
        @keyframes twinkleAnim { 0%, 100% { opacity: 0.2; } 50% { opacity: 0.7; } }

        /* ---- Responsive ---- */
        @media (min-width: 769px) {
            .game-board { border-radius: 16px; margin: 0 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.06), inset 0 0 40px rgba(255,242,208,0.3); }
        }
        @media (max-width: 768px) {
            .net-node { width: 80px; height: 80px; }
            .net-node.teacher { width: 100px; height: 100px; }
            .net-label { font-size: 11px; }
            .net-node.teacher .net-label { font-size: 12px; }
            .black-hole { width: 100px; height: 100px; }
            .game-overlay h2 { font-size: 1.6rem; }
            .score-badge { font-size: 0.85rem; padding: 4px 12px; }
            .target-label { font-size: 0.9rem; padding: 4px 14px; }
        }
        @media (max-width: 480px) {
            .net-node { width: 70px; height: 70px; }
            .net-node.teacher { width: 90px; height: 90px; }
            .photo-placeholder { font-size: 1.8rem; }
        }
    </style>
</head>
<body>

    <!-- Entrance Overlay -->
    <div id="entranceOverlay">
        <h1>🌀 Black Hole Game</h1>
        <p>Slingshot students to push Sadman Sir into the black hole!</p>
    </div>

    <!-- Game Header -->
    <div class="game-header">
        <a class="back-btn" href="index.html">← Home</a>
        <div class="score-badge">⭐ Score: <span id="scoreValue">0</span></div>
    </div>
    <div class="target-label">🎯 Target: Sadman Sir</div>

    <!-- Game Board -->
    <div class="game-board" id="gameBoard">

        <div class="net-node teacher" id="memTeacher" style="top:50%;left:50%;transform:translate(-50%,-50%);">
            <div class="net-img"><img src="MEMBER/TEACHER-SADMAN.jpeg" alt="Sadman Sir"></div>
            <span class="net-label">Sadman Sir</span>
        </div>

        <div class="net-node" id="memAbir" style="top:22%;left:20%;transform:translate(-50%,-50%);">
            <div class="net-img"><img src="MEMBER/ABIR.jpeg" alt="Abir"></div>
            <span class="net-label">Abir</span>
        </div>
        <div class="net-node" id="memSabbir" style="top:20%;left:80%;transform:translate(-50%,-50%);">
            <div class="net-img"><img src="MEMBER/SABBIIR.jpeg" alt="Sabbir"></div>
            <span class="net-label">Sabbir</span>
        </div>

        <div class="net-node" id="memAdnan" style="top:35%;left:90%;transform:translate(-50%,-50%);">
            <div class="net-img"><img src="MEMBER/Adnan.jpeg" alt="Adnan"></div>
            <span class="net-label">Adnan</span>
        </div>
        <div class="net-node" id="memPurno" style="top:5%;left:30%;transform:translate(-50%,-50%);">
            <div class="net-img"><img src="MEMBER/Purno.jpeg" alt="Purno"></div>
            <span class="net-label">Purno</span>
        </div>
        <div class="net-node" id="memRion" style="top:92%;left:78%;transform:translate(-50%,-50%);">
            <div class="net-img"><img src="MEMBER/Rion.jpeg" alt="Rion"></div>
            <span class="net-label">Rion</span>
        </div>
        <div class="net-node" id="memShuvo" style="top:92%;left:20%;transform:translate(-50%,-50%);">
            <div class="net-img"><img src="MEMBER/Shuvo.jpeg" alt="Shuvo"></div>
            <span class="net-label">Shuvo</span>
        </div>

        <div class="net-node" id="memRahul" style="top:5%;left:50%;transform:translate(-50%,-50%);">
            <div class="net-img"><img src="MEMBER/Rahul.jpeg" alt="Rahul"></div>
            <span class="net-label">Rahul</span>
        </div>
        <div class="net-node" id="memShan" style="top:46%;left:78%;transform:translate(-50%,-50%);">
            <div class="net-img"><img src="MEMBER/Shan.jpeg" alt="Shan"></div>
            <span class="net-label">Shan</span>
        </div>
        <div class="net-node" id="memMomo" style="top:72%;left:68%;transform:translate(-50%,-50%);">
            <div class="net-img"><img src="MEMBER/MOMO.jpeg" alt="Momo"></div>
            <span class="net-label">Momo</span>
        </div>
        <div class="net-node" id="memRafi" style="top:80%;left:46%;transform:translate(-50%,-50%);">
            <div class="net-img"><img src="MEMBER/Rafi.jpeg" alt="Rafi"></div>
            <span class="net-label">Rafi</span>
        </div>
        <div class="net-node" id="memTareq" style="top:72%;left:22%;transform:translate(-50%,-50%);">
            <div class="net-img"><img src="MEMBER/Tareq Hasan.jpeg" alt="Tareq Hasan"></div>
            <span class="net-label">Tareq Hasan</span>
        </div>
        <div class="net-node" id="memShaila" style="top:46%;left:12%;transform:translate(-50%,-50%);">
            <div class="net-img"><img src="MEMBER/Shaila.jpeg" alt="Shaila"></div>
            <span class="net-label">Shaila</span>
        </div>

        <div class="black-hole pulse" id="blackHole"></div>
        <div class="aim-line" id="aimLine"></div>
        <div class="aim-line-dot" id="aimDot"></div>

        <div class="game-overlay game-win" id="gameWinOverlay">
            <h2>🌟 Black Hole Master! 🌟</h2>
            <div class="score-final" id="winScore">Final Score: 0</div>
            <button onclick="G.reset()">🎮 Play Again</button>
        </div>
    </div>

    <button class="reset-btn" id="resetBtn">↻ Reset</button>

    <script>
        // ===== ENTRANCE ANIMATION =====
        document.addEventListener('DOMContentLoaded', () => {
            setTimeout(() => {
                document.getElementById('entranceOverlay').classList.add('hidden');
            }, 800);
            // Stagger node entrance
            const els = document.querySelectorAll('.net-node');
            els.forEach((el, i) => {
                el.style.opacity = '0';
                setTimeout(() => {
                    el.style.opacity = '';
                    el.classList.add('entrance');
                }, 900 + i * 60);
            });
        });

        // ===== CONFETTI =====
        function burstConfetti(count) {
            const container = document.body;
            const colors = ['#FFB2B2','#FFD700','#e8956a','#c4836a','#FFF2D0','#FF6B6B','#4fc3f7','#81c784'];
            for (let i = 0; i < count; i++) {
                const p = document.createElement('div');
                p.className = 'confetti-particle';
                const angle = Math.random() * 360;
                const dist = Math.random() * 200 + 60;
                p.style.left = (window.innerWidth/2) + 'px';
                p.style.top = (window.innerHeight/2) + 'px';
                p.style.setProperty('--dx', Math.cos(angle * Math.PI/180) * dist + 'px');
                p.style.setProperty('--dy', Math.sin(angle * Math.PI/180) * dist + 'px');
                p.style.background = colors[Math.floor(Math.random() * colors.length)];
                p.style.animationDuration = (Math.random() * 0.5 + 0.5) + 's';
                p.style.animationDelay = (Math.random() * 0.2) + 's';
                container.appendChild(p);
                setTimeout(() => p.remove(), 1200);
            }
        }

        // ===== TWINKLE DOTS =====
        (function() {
            for (let i = 0; i < 20; i++) {
                const dot = document.createElement('div');
                dot.className = 'twinkle';
                dot.style.left = Math.random() * 100 + '%';
                dot.style.top = Math.random() * 100 + '%';
                dot.style.animationDelay = Math.random() * 3 + 's';
                dot.style.width = (Math.random() * 3 + 2) + 'px';
                dot.style.height = dot.style.width;
                document.body.appendChild(dot);
            }
        })();

        // ===== BLACK HOLE GAME (Matter.js) =====
        const G = window.G = {};
        const c = document.getElementById('gameBoard');
        const nodeEls = c.querySelectorAll('.net-node');
        const holeEl = document.getElementById('blackHole');
        const aimEl = document.getElementById('aimLine');
        const aimDot = document.getElementById('aimDot');
        const scoreEl = document.getElementById('scoreValue');
        const winEl = document.getElementById('gameWinOverlay');
        const winScoreEl = document.getElementById('winScore');
        const resetBtn = document.getElementById('resetBtn');
        const { Engine, Bodies, Composite, Events, Body } = Matter;

        let mBodies = [];
        const hole = { x: 0, y: 0, rad: 65 };
        let score = 0, aimBody = null, anchor = { x: 0, y: 0 };
        let shooting = false, settled = true, won = false, gameOver = false;
        let holeRevealed = false;
        let settleTimer = null, engine = null, holeSensor = null;
        const MAX_P = 25, PULL_SC = 0.35;
        const initPos = [];

        nodeEls.forEach(el => {
            const r = el.getBoundingClientRect(), cr = c.getBoundingClientRect();
            initPos.push({ x: r.left - cr.left + r.width/2, y: r.top - cr.top + r.height/2, w: r.width, h: r.height, t: el.classList.contains('teacher') });
        });

        function pos(b) { b.el.style.left = (b.x - b.w/2) + 'px'; b.el.style.top = (b.y - b.h/2) + 'px'; }
        function hideOL() { winEl.classList.remove('active'); }
        function hideAL() { aimEl.style.display = 'none'; if (aimDot) aimDot.style.display = 'none'; }

        function randHole() {
            const cr = c.getBoundingClientRect();
            const sz = Math.min(cr.width, cr.height);
            const pad = Math.max(50, sz * 0.12);
            const minDist = Math.max(80, sz * 0.35);
            let hx, hy, at = 0;
            do {
                hx = pad + Math.random() * (cr.width - pad*2);
                hy = pad + Math.random() * (cr.height - pad*2);
                at++;
            } while (mBodies.some(b => b.active && Math.hypot(hx-b.x, hy-b.y) < minDist) && at < 40);
            if (at >= 40) {
                const teacher = mBodies.find(b => b.teacher);
                if (teacher) {
                    hx = teacher.x < cr.width/2 ? cr.width - pad : pad;
                    hy = teacher.y < cr.height/2 ? cr.height - pad : pad;
                }
            }
            hole.x = hx; hole.y = hy;
            holeEl.style.left = (hx - hole.rad) + 'px'; holeEl.style.top = (hy - hole.rad) + 'px';
            if (holeSensor) Body.setPosition(holeSensor, { x: hx, y: hy });
        }

        function initPhysics() {
            engine = Engine.create({ gravity: { x: 0, y: 0 } });
            const cr = c.getBoundingClientRect();
            const wo = { isStatic: true, restitution: 0.85, friction: 0, frictionStatic: 0, label: 'wall', render: { visible: false } };
            Composite.add(engine.world, [
                Bodies.rectangle(cr.width/2, -25, cr.width*2, 50, wo),
                Bodies.rectangle(cr.width/2, cr.height+25, cr.width*2, 50, wo),
                Bodies.rectangle(-25, cr.height/2, 50, cr.height*2, wo),
                Bodies.rectangle(cr.width+25, cr.height/2, 50, cr.height*2, wo),
            ]);
            mBodies.forEach(b => {
                const body = Bodies.circle(b.x, b.y, b.rad, {
                    label: b.teacher ? 'teacher' : 'student',
                    restitution: 0.4, frictionAir: 0.025,
                    density: b.teacher ? 0.0004 : 0.002,
                    render: { visible: false }
                });
                b.body = body; b.active = true;
                Composite.add(engine.world, body);
            });
            if (holeRevealed) {
                holeSensor = Bodies.circle(hole.x, hole.y, hole.rad, {
                    isStatic: true, isSensor: true, label: 'blackhole', render: { visible: false }
                });
                Composite.add(engine.world, holeSensor);
            }
            Events.on(engine, 'collisionStart', function(event) {
                event.pairs.forEach(pair => {
                    const labels = [pair.bodyA.label, pair.bodyB.label];
                    if (labels.includes('blackhole') && labels.includes('teacher')) winG();
                });
            });
            Events.on(engine, 'afterUpdate', function() {
                mBodies.forEach(b => {
                    if (!b.active || !b.body) return;
                    b.x = b.body.position.x; b.y = b.body.position.y;
                    pos(b);
                });
                const moving = mBodies.some(b => {
                    if (!b.active || !b.body) return false;
                    const v = b.body.velocity;
                    return Math.abs(v.x) > 0.5 || Math.abs(v.y) > 0.5;
                });
                if (!moving && shooting) {
                    shooting = false;
                    if (!settleTimer) settleTimer = setTimeout(() => {
                        settleTimer = null;
                        if (!won && !gameOver) {
                            if (holeRevealed) randHole();
                            settled = true;
                        }
                    }, 400);
                }
            });
        }

        G.reset = function() {
            clearTimeout(settleTimer); hideOL();
            score = 0; scoreEl.textContent = '0'; won = false; gameOver = false;
            holeRevealed = false; holeSensor = null;
            mBodies = [];
            const cr = c.getBoundingClientRect();
            nodeEls.forEach((el, i) => {
                const p = initPos[i]; if (!p) return;
                const b = { el, x: p.x, y: p.y, w: p.w, h: p.h, rad: Math.max(p.w,p.h)/2, teacher: p.t, body: null, active: true };
                b.x = Math.max(b.rad, Math.min(cr.width - b.rad, b.x));
                b.y = Math.max(b.rad, Math.min(cr.height - b.rad, b.y));
                mBodies.push(b);
                el.style.transform = 'none';
                el.style.opacity = '1'; el.style.visibility = ''; el.style.display = '';
                el.classList.remove('shooting'); el.style.zIndex = ''; el.style.transition = '';
                el.style.cursor = b.teacher ? 'default' : 'crosshair';
                pos(b);
            });
            holeEl.style.transform = ''; holeEl.style.opacity = ''; holeEl.style.transition = ''; holeEl.style.display = 'none';
            shooting = false; settled = true; aimBody = null; hideAL();
            initPhysics();
        };

        function revealHole() {
            if (holeRevealed) return;
            holeRevealed = true;
            randHole();
            holeEl.style.display = 'block';
            holeEl.classList.add('entrance');
            setTimeout(() => holeEl.classList.remove('entrance'), 600);
            holeSensor = Bodies.circle(hole.x, hole.y, hole.rad, {
                isStatic: true, isSensor: true, label: 'blackhole', render: { visible: false }
            });
            Composite.add(engine.world, holeSensor);
        }

        function winG() {
            if (won) return;
            won = true; clearTimeout(settleTimer);
            score += 200; scoreEl.textContent = score;
            winScoreEl.textContent = 'Final Score: ' + score;
            holeEl.style.transition = 'all 0.5s ease'; holeEl.style.transform = 'scale(3)'; holeEl.style.opacity = '0';
            setTimeout(() => {
                winEl.classList.add('active');
                burstConfetti(36);
            }, 500);
        }

        // --- Aiming ---
        function stAim(e, cx, cy) {
            if (shooting || won || gameOver || !settled) return;
            const el = e.currentTarget; const b = mBodies.find(x => x.el === el && x.active);
            if (!b || b.teacher) return;
            clearTimeout(settleTimer); settleTimer = null;
            aimBody = b; anchor.x = b.x; anchor.y = b.y;
            b.el.classList.add('shooting'); upAL(cx, cy); e.preventDefault();
        }
        function upAL(cx, cy) {
            if (!aimBody) return;
            const cr = c.getBoundingClientRect();
            const mx = cx - cr.left, my = cy - cr.top;
            const dx = anchor.x - mx, dy = anchor.y - my, dist = Math.hypot(dx, dy);
            if (dist < 5) { hideAL(); return; }
            aimEl.style.display = 'block';
            if (aimDot) { aimDot.style.display = 'block'; aimDot.style.left = anchor.x + 'px'; aimDot.style.top = anchor.y + 'px'; }
            const nx = dx/dist, ny = dy/dist;
            const rawP = Math.min(dist * PULL_SC, MAX_P);
            const visLen = Math.min(dist, 300);
            aimEl.style.left = anchor.x + 'px'; aimEl.style.top = anchor.y + 'px';
            aimEl.style.width = visLen + 'px';
            aimEl.style.transform = `rotate(${Math.atan2(ny, nx)}rad)`;
            aimEl.style.transformOrigin = '0 50%';
            const pr = rawP / MAX_P;
            if (pr < 0.3) { aimEl.style.background = 'linear-gradient(90deg, #4fc3f7, #81c784)'; aimEl.style.color = '#4fc3f7'; }
            else if (pr < 0.6) { aimEl.style.background = 'linear-gradient(90deg, #81c784, #ffeb3b)'; aimEl.style.color = '#81c784'; }
            else if (pr < 0.85) { aimEl.style.background = 'linear-gradient(90deg, #ffeb3b, #ff9800)'; aimEl.style.color = '#ff9800'; }
            else { aimEl.style.background = 'linear-gradient(90deg, #ff9800, #f44336)'; aimEl.style.color = '#f44336'; }
        }
        function enAim(cx, cy) {
            if (!aimBody) return;
            const cr = c.getBoundingClientRect();
            const mx = cx - cr.left, my = cy - cr.top;
            const dx = anchor.x - mx, dy = anchor.y - my, dist = Math.hypot(dx, dy);
            aimBody.el.classList.remove('shooting'); hideAL();
            if (dist >= 5) {
                const nx = dx/dist, ny = dy/dist, pwr = Math.min(dist * PULL_SC, MAX_P);
                Body.setVelocity(aimBody.body, { x: nx * pwr, y: ny * pwr });
                shooting = true; settled = false;
                clearTimeout(settleTimer); settleTimer = null;
                if (!holeRevealed) revealHole();
            }
            aimBody = null;
        }

        // --- Events ---
        nodeEls.forEach(el => {
            el.addEventListener('mousedown', function(e) { stAim(e, e.clientX, e.clientY); });
            el.addEventListener('touchstart', function(e) { const t = e.touches[0]; stAim(e, t.clientX, t.clientY); }, {passive:false});
        });
        document.addEventListener('mousemove', function(e) { upAL(e.clientX, e.clientY); });
        document.addEventListener('mouseup', function(e) { enAim(e.clientX, e.clientY); });
        document.addEventListener('touchmove', function(e) { if (!aimBody) return; const t = e.touches[0]; upAL(t.clientX, t.clientY); }, {passive:false});
        document.addEventListener('touchend', function(e) { if (!aimBody) return; const t = e.changedTouches[0]; enAim(t.clientX, t.clientY); });
        resetBtn.addEventListener('click', G.reset);

        // --- Start ---
        G.reset();
        (function loop() {
            if (engine && !won && !gameOver) Engine.update(engine, 16.67);
            requestAnimationFrame(loop);
        })();
    </script>
</body>
</html>
